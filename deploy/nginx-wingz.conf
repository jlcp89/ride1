# HTTP — redirect everything to HTTPS. Catches both the domain and the
# bare IP (107.23.122.99) because this is the default_server on :80.
# Let's Encrypt renewal uses the HTTP-01 challenge via the certbot-nginx
# plugin, which temporarily injects its own listener during renewal.
server {
    listen 80 default_server;
    server_name wingz-ride.d3sarrollo.dev;

    return 301 https://wingz-ride.d3sarrollo.dev$request_uri;
}

# HTTPS — SPA + /api/ reverse proxy, same-origin (no CORS).
# TLS cert issued by Let's Encrypt via `sudo certbot --nginx -d wingz-ride.d3sarrollo.dev`.
# Auto-renewal handled by the certbot-renew.timer systemd unit.
server {
    listen 443 ssl;
    server_name wingz-ride.d3sarrollo.dev;

    ssl_certificate /etc/letsencrypt/live/wingz-ride.d3sarrollo.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wingz-ride.d3sarrollo.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Served out of /usr/share/nginx/html (part of nginx's default search
    # tree) because /home/ec2-user is 0700 on Amazon Linux — the nginx
    # worker user can't traverse into it, so the dist must live elsewhere.
    root /usr/share/nginx/html/ride1/dist;
    index index.html;

    # SPA fallback — any non-file path returns index.html so client-side
    # routing works even if a user refreshes a deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy /api/ to gunicorn. Same origin for the browser → no CORS.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache static assets aggressively — Vite produces hashed filenames.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
