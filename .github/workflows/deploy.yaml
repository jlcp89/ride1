name: Deploy Frontend to EC2

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main, dev]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  deploy_prod:
    name: Deploy PROD
    needs: build
    if: |
      github.event_name == 'push' ||
      (github.event.pull_request.base.ref == 'main' &&
       github.event.action == 'closed' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Copy dist + nginx config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*,deploy/nginx-wingz.conf"
          target: "/home/ec2-user/ride1-staging"
          strip_components: 0

      - name: Install nginx + activate new build
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # One-time install (idempotent — no-op on hosts where nginx is
            # already present, like the current EC2 box).
            if ! command -v nginx >/dev/null 2>&1; then
              sudo dnf install -y nginx
              sudo systemctl enable nginx
            fi

            # Atomically swap in the new build
            sudo mkdir -p /home/ec2-user/production/ride1
            sudo rm -rf /home/ec2-user/production/ride1/dist
            sudo mv /home/ec2-user/ride1-staging/dist /home/ec2-user/production/ride1/dist
            sudo chown -R ec2-user:ec2-user /home/ec2-user/production/ride1

            # Replace any pre-existing nginx site configs on :80. The previous
            # ride0 deployment installed wingz-api.conf which proxied EVERY
            # path to gunicorn — the new wingz.conf serves the SPA on / and
            # only proxies /api/ to gunicorn. Both files declaring "listen 80"
            # would make nginx -t fail, so we remove the old one explicitly.
            sudo rm -f /etc/nginx/conf.d/wingz-api.conf
            sudo rm -f /etc/nginx/conf.d/default.conf
            sudo cp /home/ec2-user/ride1-staging/deploy/nginx-wingz.conf \
                    /etc/nginx/conf.d/wingz.conf

            # Validate and reload — fail loudly if the config is bad
            sudo nginx -t
            sudo systemctl restart nginx

            # Clean up staging dir
            rm -rf /home/ec2-user/ride1-staging

            # Smoke test from inside the box. Django's ALLOWED_HOSTS accepts
            # the public IP but not "localhost", so we send an explicit Host
            # header matching EC2_HOST_PROD to simulate real user traffic.
            curl -sf -H "Host: ${{ secrets.EC2_HOST_PROD }}" \
              http://localhost/ -o /dev/null -w "FRONTEND %{http_code}\n"
            curl -sf -H "Host: ${{ secrets.EC2_HOST_PROD }}" \
              -u admin@wingz.com:adminpass123 \
              http://localhost/api/rides/ -o /dev/null -w "API %{http_code}\n"
